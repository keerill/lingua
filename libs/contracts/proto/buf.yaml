version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # Allow returning domain messages directly (NextSchedule, Deck, Card, ...)
    # instead of forcing a <Method>Response wrapper around every single result.
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
