syntax = "proto3";

package lingua.progress.v1;

// Internal gRPC surface of svc-progress (was internal REST /internal/progress/*).
// user_id replaces the x-user-id HTTP header.
service ProgressService {
  rpc GetOverview(GetOverviewRequest) returns (ProgressOverview);
  rpc GetDashboard(GetDashboardRequest) returns (ProgressDashboard);
}

message GetOverviewRequest {
  string user_id = 1;
}

message GetDashboardRequest {
  string user_id = 1;
}

message ProgressOverview {
  string user_id = 1;
  int32 current_streak = 2;
  int32 longest_streak = 3;
  int32 due_count = 4;
  int32 learned_words = 5;
  int32 total_reviews = 6;
  optional string last_active_day = 7; // unset == null
}

message DailyPoint {
  string day = 1; // YYYY-MM-DD
  int32 count = 2;
}

message PronunciationPoint {
  string day = 1; // YYYY-MM-DD
  int32 mistakes = 2;
}

message ProgressDashboard {
  ProgressOverview overview = 1;
  repeated DailyPoint reviews_by_day = 2;
  repeated DailyPoint learned_by_day = 3;
  repeated PronunciationPoint pronunciation_trend = 4;
}
