# Single shared Secret: per-service DATABASE_URL_* plus the cross-cutting
# credentials. App charts reference individual keys via their `secretEnv`
# lists (no blanket envFrom).
#
# Staging sets `secrets.create: false`: the deploy job pre-creates lingua-secrets
# from Terraform outputs (managed DB URIs, Kafka SASL/CA, Karapace creds) so
# managed credentials never enter the Helm release history.
{{- if .Values.secrets.create }}
{{- $pg := printf "postgresql://lingua:%s@postgres:5432" .Values.secrets.postgresPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.secretName }}
  labels:
    app.kubernetes.io/name: lingua-secrets
    app.kubernetes.io/part-of: lingua
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  DATABASE_URL_IDENTITY: '{{ $pg }}/identity?schema=public'
  DATABASE_URL_VOCABULARY: '{{ $pg }}/vocabulary?schema=public'
  DATABASE_URL_LEARNING: '{{ $pg }}/learning?schema=public'
  DATABASE_URL_DIALOG: '{{ $pg }}/dialog?schema=public'
  DATABASE_URL_CONTENT: '{{ $pg }}/content?schema=public'
  DATABASE_URL_PROGRESS: '{{ $pg }}/progress?schema=public'
  DATABASE_URL_NOTIFICATIONS: '{{ $pg }}/notifications?schema=public'
  BFF_COOKIE_SECRET: {{ .Values.secrets.bffCookieSecret | quote }}
  KEYCLOAK_BFF_CLIENT_SECRET: {{ .Values.global.keycloakBffClientSecret | quote }}
  KC_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.secrets.keycloakAdminPassword | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
{{- end }}
