{{- if .Values.global.observability.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  labels:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: lingua
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-exporter
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: kafka-exporter
          image: {{ .Values.image }}
          args:
            - '--kafka.server={{ .Values.kafkaServer }}'
          ports:
            - { name: metrics, containerPort: 9308 }
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  labels:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: lingua
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka-exporter
  ports:
    - { name: metrics, port: 9308, targetPort: metrics }
{{- end }}
