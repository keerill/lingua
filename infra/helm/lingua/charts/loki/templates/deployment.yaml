{{- if .Values.global.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: lingua
data:
  loki.yaml: |
{{ .Files.Get "files/loki.yaml" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: lingua
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
      annotations:
        checksum/config: {{ .Files.Get "files/loki.yaml" | sha256sum }}
    spec:
      enableServiceLinks: false
      securityContext:
        # uid/gid 10001 = the grafana/loki image user.
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: loki
          image: {{ .Values.image }}
          args: ['-config.file=/etc/loki/loki.yaml']
          ports:
            - { name: http, containerPort: 3100 }
          volumeMounts:
            - { name: config, mountPath: /etc/loki, readOnly: true }
            - { name: data, mountPath: /loki }
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: loki
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: lingua
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: loki
  ports:
    - { name: http, port: 3100, targetPort: http }
{{- end }}
