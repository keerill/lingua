# Grafana Loki — single-binary, filesystem storage (dev/demo scale). Ingests
# logs over its native OTLP endpoint (/otlp/v1/logs); trace_id arrives as
# structured metadata so Grafana can jump log → trace.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Required for OTLP ingest (trace_id/span_id stored as structured metadata).
  allow_structured_metadata: true
  volume_enabled: true

analytics:
  reporting_enabled: false
