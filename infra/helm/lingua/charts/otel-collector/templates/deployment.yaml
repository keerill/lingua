{{- if .Values.global.observability.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: lingua
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
      annotations:
        # Roll the Deployment when the config changes.
        checksum/config: {{ .Files.Get "files/otel-collector.yaml" | sha256sum }}
    spec:
      enableServiceLinks: false
      containers:
        - name: otel-collector
          image: {{ .Values.image }}
          args: ['--config=/etc/otelcol-contrib/config.yaml']
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: prometheus, containerPort: 8889 }
            - { name: self-metrics, containerPort: 8888 }
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: otel-collector
            items:
              - key: otel-collector.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: lingua
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc }
    - { name: otlp-http, port: 4318, targetPort: otlp-http }
    - { name: prometheus, port: 8889, targetPort: prometheus }
{{- end }}
