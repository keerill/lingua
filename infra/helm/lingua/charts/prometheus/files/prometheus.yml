# Prometheus scrape config. Pulls RED metrics + app OTLP metrics from the
# Collector's prometheus exporter, the Collector's own telemetry, and Kafka
# consumer-group lag from kafka-exporter.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: otel-collector-self
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: kafka
    static_configs:
      - targets: ['kafka-exporter:9308']
