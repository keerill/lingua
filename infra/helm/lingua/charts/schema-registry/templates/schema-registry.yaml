{{- if and .Values.global.schemaRegistry .Values.global.schemaRegistry.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  labels:
    app.kubernetes.io/name: schema-registry
    app.kubernetes.io/part-of: lingua
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: schema-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: schema-registry
    spec:
      enableServiceLinks: false
      containers:
        - name: schema-registry
          image: {{ .Values.image }}
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: schema-registry
            # Stores schemas in the broker's _schemas topic (KRaft-agnostic).
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: 'PLAINTEXT://kafka:9092'
            - name: SCHEMA_REGISTRY_LISTENERS
              value: 'http://0.0.0.0:{{ .Values.port }}'
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          readinessProbe:
            httpGet:
              path: /subjects
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  labels:
    app.kubernetes.io/name: schema-registry
    app.kubernetes.io/part-of: lingua
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: schema-registry
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: http
{{- end }}
