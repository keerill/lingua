{{- if .Values.global.observability.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: lingua
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
      annotations:
        checksum/dashboards: {{ (.Files.Glob "files/dashboards/*.json").AsConfig | sha256sum }}
        checksum/datasources: {{ .Files.Get "files/datasources.yaml" | sha256sum }}
    spec:
      enableServiceLinks: false
      securityContext:
        # uid/gid 472 = the grafana image user.
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: {{ .Values.image }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.adminPassword | quote }}
            # Frictionless demo: anyone reaching the ingress gets a read-only view.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: 'true'
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: 'Viewer'
            - name: GF_SERVER_ROOT_URL
              value: http://{{ .Values.ingress.subdomain }}.{{ .Values.global.domain }}
          ports:
            - { name: http, containerPort: 3000 }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources, readOnly: true }
            - { name: dashboards-provider, mountPath: /etc/grafana/provisioning/dashboards, readOnly: true }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards, readOnly: true }
            - { name: data, mountPath: /var/lib/grafana }
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: lingua
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - { name: http, port: 3000, targetPort: http }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: lingua
spec:
  ingressClassName: {{ .Values.global.ingressClassName }}
  rules:
    - host: {{ .Values.ingress.subdomain }}.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  name: http
{{- end }}
