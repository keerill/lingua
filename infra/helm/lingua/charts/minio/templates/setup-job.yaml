# Creates the audio bucket and enables anonymous downloads (parity with the
# compose minio-setup one-shot).
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: lingua
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-setup
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      containers:
        - name: setup
          image: {{ .Values.mcImage }}
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: MINIO_SECRET_KEY
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local http://minio:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"; do
                echo 'waiting for minio...'; sleep 3
              done
              mc mb -p local/{{ .Values.bucket }}
              mc anonymous set download local/{{ .Values.bucket }}
              echo 'bucket ready'
