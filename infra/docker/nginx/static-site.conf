# Lingua — nginx vhost for the static frontends (shell + MFE remotes).
#
# - CORS `*`: remoteEntry.js / mf-manifest.json / chunks are fetched
#   cross-origin by the shell (app.<domain> loads mfe-*.<domain>); static
#   assets carry no credentials, so the wildcard is safe.
# - `no-cache` everywhere: the Rspack output uses stable chunk names (22.js,
#   remoteEntry.js, ...) without content hashes, so long-lived caching would
#   serve stale code after a redeploy. ETags keep revalidation cheap.
# - SPA fallback to index.html: the shell is a client-routed app; harmless for
#   the remotes (their index.html is unused).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
